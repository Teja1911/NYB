<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <form action="">
        <caption>Employee Form</caption><br><br>
        <label for="username">UserName:</label>
        <input type="text" id="username" placeholder="Enter User Name" required><br><br>
        <label for="email">Email:</label>
        <input type="email" id="email" placeholder="Enter Email Address" required><br><br>
        <label for="password">Password:</label>
        <input type="password" id="password" placeholder="Enter Password" required minlength="6"><br><br>
        <button type="button" id="submit">Submit</button>
    </form>
    <h3 id="usernamemessage"></h3>
    <h3 id="emailmessage"></h3>
    <h3 id="passwordmessage"></h3>
    <h3 id="message"></h3>
    <script src="./index.js"></script>
</body>
</html>
