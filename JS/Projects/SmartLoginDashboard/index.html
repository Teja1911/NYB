<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="./style.css">
</head>
<body>
    <div class="container">
        <h1>Smart Login Dashboard</h1>
        <input type="text" id="userName" placeholder="Enter Username">
        <br><br>
        <input type="password" id="password" placeholder="Enter Password"><br><br>
        <div class="buttons">
            <button id="localLogin">Login With Local Storage</button>
            <button id="sessionLogin">Login with Session Storage</button>
        </div>
        <hr>
        <h3>Current user</h3>
        <p id="currentUser">No user Logged In</p>
        <button id="showUser">Show User</button><br><br>
        <button id="logout">Logout</button>
        <p id="message"></p>
    </div>
    <script src="./index.js" type="module"></script>
</body>
</html>
