    <h2>Search Student</h2>
    <input type="text" id="searchStudent" placeholder="Enter Student Name">
    <button onclick="searchStudent()">Search</button>
    <p id="studentResult"></p>
    <h2>Search Subject</h2>
    <input type="text" id="searchSubject" placeholder="Enter Subject">
    <button onclick="searchSubject()">Search</button>
    <p id="subjectResult"></p>
    
    <h2>Student Record</h2>
    <table border="1" cellpadding="10" cellspacing="0">
        <thead>
            <tr>
                <th>Name</th>
                <th>Total</th>
                <th>Average</th>
            </tr>
        </thead>
        <tbody id="studentTable"></tbody>
    </table><br>
    <h2>Add Student</h2>
    <input  id="studentName" placeholder="Student Name">
    <input id="mark1" placeholder="Mark 1">
    <input id="mark2" placeholder="Mark 2">
    <input  id="mark3" placeholder="Mark 3">
    <button onclick="addStudent()">Add Student</button><br>
    <h2>Remove Student</h2>
    <input type="text" id="removeStudent" placeholder="Student Name">
