<!DOCTYPE html>
<html lang="en">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Responsive Design</title>
    <link rel="stylesheet" href="./style.css">
</head>
<body>
    <header>
        <div class="logo">Dashboard</div>
        <div class="search"><input type="text" placeholder="Search"></div>
        <div class="profile">

            👤
        </div>
    </header>
    <main class="dashboard">
        <aside>
            <h3>Menu</h3>
            <ul>
                <li>Home</li>
                <li>Analytics</li>
                <li>Users</li>
                <li>Products</li>
            </ul>

        <section class="cards">
            <div class="card-revenue">Revenue</div>
            <div class="card-user">Users</div>
            <div class="card-sales">Sales</div>
            <div class="card-orders">Orders</div>
            <div class="card-activity">Activity</div>
            <div class="card-message">Message</div>

    <footer>
        Dashboard Footer

</html>
