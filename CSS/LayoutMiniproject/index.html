<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CSS Layout Showcase</title>
<link rel="stylesheet"href="style.css">
</head>
<body>
<div class="container">
<header>
<h1>CSS Layout Showcase</h1>
</header>
<!-- BOX MODEL -->
<section>
<h2>CSS Box Model</h2>
<div class="box-model">Content Area</div>
</section>
<!-- DISPLAY -->
<section>
<h2>Display Properties</h2>
<div class="block">Block</div>
<span class="inline">Inline</span>
<div class="inline-block">Inline Block</div>
<div class="none">Hidden</div>
</section>
<!-- POSITION -->
<section>
<h2>Position Examples</h2>
<div class="parent">
<div class="relative-box">Relative</div>
<div class="absolute-box">Absolute</div>
</div>
<div class="fixed-box">Chat</div>
<div class="sticky">Sticky Header</div>
</section>
<!-- FLOAT -->
<section>
<h2>Float and Clear</h2>
<div class="left">Left</div>
<div class="right">Right</div>
<div class="clear"></div>
</section>
<!-- FLEXBOX -->
<section>
<h2>Flexbox Layout</h2>
<div class="flex-container">
<div class="item">1</div>
<div class="item">2</div>
<div class="item">3</div>
<div class="item">4</div>
</div>
</section>
<!-- GRID -->
<section>
<h2>CSS Grid</h2>
<div class="grid-container">
<div>A</div>
<div>B</div>
<div>C</div>
<div>D</div>
<div>E</div>
<div>F</div>
</div>
</section>
<!-- Z INDEX -->
<section>
<h2>Z Index</h2>
<div class="z-container">
<div class="red"></div>
<div class="blue"></div>
</div>
</section>
<footer>
    <p>Responsive CSS Layout Project</p>
</footer>
</div>
</body>
</html>
