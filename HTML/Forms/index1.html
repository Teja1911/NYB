<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <form action="" >
        <label for="username">UserName:</label>
        <input type="text" id="username" placeholder="Enter User Name" required maxlength="15"><br><br>
        <label for="email">Email:</label>
        <input type="email" id="email" placeholder="Enter Email Address" required><br><br>
        <label for="phone">Phone:</label>
        <input type="number" id="phone" placeholder="Enter Mobile Number" required pattern="[0-9]{10}"><br><br>
        <label for="password">Password:</label>
        <input type="password" id="password" placeholder="Enter Password" required maxlength="9" pattern="^(?=.*[A-Z])(?=.*[a-z])(?=.*[!@#$%^&_]).{9,}$"><br><br>
        <label for="confirmpassword">Confirm Password:</label>
        <input type="password" name="" id="confirmpassword" placeholder="Re-Enter Password" required maxlength="9" pattern="^(?=.*[A-Z])(?=.*[a-z])(?=.*[!@#$%&*_-]).{9,}$"><br><br>
        <label for="gender">Gender:</label><br><br>
        <div class="gender">
            <input type="radio" name="gender" id="male">
            <label for="male">Male</label><br><br>
            <input type="radio" name="gender" id="female">
            <label for="female">Female</label><br><br>
            <input type="radio" name="gender" id="others">
            <label for="others">Others</label>
        </div>
        <br><br>
        <label for="skills">Skills:</label><br><br>
        <input type="checkbox" name="skills" id="html">
        <label for="html">HTML</label><br><br>
        <input type="checkbox" name="skills">
        <label for="css">CSS</label><br><br>
        <input type="checkbox" name="skills" id="js">
        <label for="js">JS</label><br><br>
        <input type="checkbox" name="skills" id="react">
        <label for="react">React</label><br><br>
        <input type="checkbox" name="skills" id="git">
        <label for="git">Git</label><br><br>
        <input type="checkbox" name="skills" id="api">
        <label for="api">API</label><br><br>
        <input type="checkbox" name="skills" id="nodejs">
        <label for="nodejs">NodeJS</label><br><br>
        <label for="districts">Districts:</label>
        <select name="districts" id="districts">
            <option value="">Select The District</option>
            <option value="Hyderabad">Hyderabad</option>
            <option value="Rangareddy">Rangareddy</option>
            <option value="Medchal">Medchal-Malkajgiri</option>
            <option value="Warangal">Warangal</option>
            <option value="Visakhapatnam">Visakhapatnam</option>
            <option value="NTR">NTR</option>
            <option value="Tirupati">Tirupati</option>
        </select>
        <br><br>
        <button type="submit">Submit</button>  
        <button type="reset">Reset</button>
    </form>
   
</body>
</html>
