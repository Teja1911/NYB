<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Basic HTML Tags</title>
</head>
<body>
    <header><h1>This is my First Webpage</h1></header>
    <div>
        <!-- Heading Tags -->
        <h1>Heading1</h1>
        <h2>Heading2</h2>
        <h3>Heading3</h3>
        <h4>Heading4</h4>
        <h5>Heading5</h5>
        <h6>Heading6</h6>
        <!-- Paragraph Tag -->
        <p>This is a Paragraph Tag</p>
        <!--  Break Tag -->
        <br>
        <!-- Horizontal Rule -->
        <hr>
        <!-- Image Tag -->
        <img src="sampleimage.avif" alt="Nature Image" width="500" height="300">
        <hr><br>
        <!-- Anchor Tag -->
        <a href="https://www.amazon.in/" target="_blank">Amazon</a>
        <!-- Text Formatting Tags -->
        <br><br>
        <b>Bold Text</b><br>
        <strong>Important Text</strong><br>
        <em>Emphasized Text</em><br>
        <i>Italic Text</i><br>
        <mark>Highlighted Text</mark><br>
        <u>Underlined Text</u>
        <p>H<sub>2</sub>O</p>
        <p>2<sup>2</sup>=4</p>
        <del>Deleted Text</del><br>
        <ins>Inserted Text</ins><br>
        <small>Small Text</small>
    </div>
</body>
</html>
